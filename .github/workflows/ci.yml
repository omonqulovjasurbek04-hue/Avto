name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-content:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Codegen is up to date
        run: |
          node tools/codegen.js
          git diff --exit-code -- engine_dart/lib/src/generated editor/src/generated schema/generated
      - name: Validate scenarios
        run: node tools/validate.js content

  engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.5.4
      - name: Analyze
        working-directory: engine_dart
        run: |
          dart pub get
          dart analyze --fatal-infos
      # Generated sources are excluded: codegen output is byte-compared in the
      # validate-content job, and running the formatter over it would make the
      # two checks contradict each other.
      - name: Format check
        working-directory: engine_dart
        run: >
          dart format --output=none --set-exit-if-changed --line-length 100
          lib/engine_dart.dart lib/raster.dart lib/src/geom.dart lib/src/layout.dart
          lib/src/raster lib/src/render bin test
      - name: Test (unit + golden snapshots)
        working-directory: engine_dart
        run: dart test
      - name: Render previews
        working-directory: engine_dart
        run: dart run bin/render.dart ../content ../build/preview
      - uses: actions/upload-artifact@v4
        with:
          name: scene-previews
          path: build/preview/*.png
      # Golden failures write a diff image; publish it so a red build is
      # diagnosable without reproducing locally.
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-diffs
          path: build/golden-diff/*.png
          if-no-files-found: ignore
