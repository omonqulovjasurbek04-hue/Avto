<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Scenario preview — engine_dart in the browser</title>
<style>
  :root {
    --bg: #12161b; --panel: #1a1f26; --line: #2a323c;
    --fg: #e6e9ed; --dim: #8b95a1; --accent: #4a8ae0; --warn: #e0a83c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--fg);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
    display: grid; grid-template-columns: 260px 1fr; min-height: 100vh;
  }
  aside { background: var(--panel); border-right: 1px solid var(--line); padding: 16px; }
  h1 { font-size: 13px; text-transform: uppercase; letter-spacing: .08em; color: var(--dim); margin: 0 0 12px; }
  button.scenario {
    display: block; width: 100%; text-align: left; margin-bottom: 6px; padding: 9px 11px;
    background: transparent; color: var(--fg); border: 1px solid var(--line);
    border-radius: 7px; cursor: pointer; font: inherit;
  }
  button.scenario:hover { border-color: var(--accent); }
  button.scenario[aria-current="true"] { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.scenario small { display: block; color: var(--dim); font-size: 12px; }
  button.scenario[aria-current="true"] small { color: #dce7f7; }
  main { padding: 24px; display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 24px; align-items: start; }
  canvas { width: 100%; max-width: 640px; aspect-ratio: 1; background: #000; border-radius: 10px; display: block; }
  .meta h2 { font-size: 17px; margin: 0 0 4px; }
  .meta .rule { color: var(--dim); font-size: 13px; margin-bottom: 18px; }
  .opt { padding: 8px 11px; border: 1px solid var(--line); border-radius: 7px; margin-bottom: 6px; }
  .opt.correct { border-color: #3fb55c; }
  .opt .tag { float: right; color: #3fb55c; font-size: 12px; }
  .langs { margin-bottom: 14px; }
  .langs button {
    background: transparent; color: var(--dim); border: 1px solid var(--line);
    border-radius: 6px; padding: 4px 9px; margin-right: 5px; cursor: pointer; font: inherit;
  }
  .langs button[aria-pressed="true"] { color: #fff; border-color: var(--accent); background: var(--accent); }
  .warn { border-left: 3px solid var(--warn); padding: 7px 11px; margin-top: 12px; color: var(--warn); font-size: 13px; }
  .stat { color: var(--dim); font-size: 12px; margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
  @media (max-width: 900px) { body { grid-template-columns: 1fr; } main { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<aside>
  <h1>Scenarios</h1>
  <div id="list"></div>
  <div class="stat" id="engineInfo"></div>
</aside>
<main>
  <canvas id="cv" width="900" height="900"></canvas>
  <div class="meta" id="meta"></div>
</main>

<script>
// The engine bundle calls this on startup to hand over its entry points.
// It must exist before engine.js loads. See engine_dart/web/engine_web.dart
// for why the engine does not simply assign the globals itself.
let engineBuildScene, engineVersion;
globalThis.__engineRegister = (buildScene, version) => {
  engineBuildScene = buildScene;
  engineVersion = version;
};
</script>
<script src="engine.js"></script>
<script>
// Replays the engine's display list on Canvas 2D.
//
// Note what is NOT here: no road geometry, no lane maths, no layering rules.
// Those all live in engine_dart, which this page loads as compiled JavaScript.
// This file only knows how to fill a polygon, stroke a path and fill a circle.

const IDS = ['sc-0001', 'sc-0002', 'sc-0003', 'sc-0004', 'sc-0005'];
const LOCALES = ['uz', 'ru', 'en'];

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let locale = 'uz';
let current = null;
const cache = new Map();

const rgba = (argb) => {
  const a = ((argb >>> 24) & 0xff) / 255;
  return `rgba(${(argb >> 16) & 0xff},${(argb >> 8) & 0xff},${argb & 0xff},${a})`;
};

function tracePoints(flat, closed) {
  ctx.beginPath();
  ctx.moveTo(flat[0], flat[1]);
  for (let i = 2; i < flat.length; i += 2) ctx.lineTo(flat[i], flat[i + 1]);
  if (closed) ctx.closePath();
}

function draw(scene) {
  const s = cv.width / scene.canvas;
  ctx.setTransform(s, 0, 0, s, 0, 0);
  ctx.clearRect(0, 0, scene.canvas, scene.canvas);
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'miter';

  for (const op of scene.ops) {
    switch (op.op) {
      case 'fillPolygon':
        tracePoints(op.points, true);
        ctx.fillStyle = rgba(op.colour);
        ctx.fill();
        break;
      case 'strokePath':
        tracePoints(op.points, op.closed);
        ctx.strokeStyle = rgba(op.colour);
        ctx.lineWidth = op.width;
        ctx.setLineDash(op.dash || []);
        ctx.stroke();
        ctx.setLineDash([]);
        break;
      case 'fillCircle':
        ctx.beginPath();
        ctx.arc(op.centre[0], op.centre[1], op.radius, 0, Math.PI * 2);
        ctx.fillStyle = rgba(op.colour);
        ctx.fill();
        break;
    }
  }
}

function renderMeta(scenario, scene) {
  const t = (loc) => (obj) => (obj && obj[loc]) || '—';
  const tr = t(locale);
  const correct = scenario.question.correct;

  document.getElementById('meta').innerHTML = `
    <div class="langs">
      ${LOCALES.map((l) => `<button data-loc="${l}" aria-pressed="${l === locale}">${l}</button>`).join('')}
    </div>
    <h2>${tr(scenario.question.text)}</h2>
    <div class="rule">${scenario.topic} &middot; rule ${scenario.resolution.rule.code}</div>
    ${scenario.question.options.map((o) => `
      <div class="opt ${o.id === correct ? 'correct' : ''}">
        ${tr(o.label)}${o.id === correct ? '<span class="tag">correct</span>' : ''}
      </div>`).join('')}
    <div class="rule" style="margin-top:16px">${tr(scenario.resolution.rule.text)}</div>
    ${scene.warnings.map((w) => `<div class="warn">${w.code}: ${w.detail}</div>`).join('')}
    <div class="stat">${scene.ops.length} draw ops &middot; ${scenario.actors.length} actors</div>
  `;
  document.querySelectorAll('.langs button').forEach((b) =>
    b.addEventListener('click', () => { locale = b.dataset.loc; show(current); })
  );
}

async function load(id) {
  if (!cache.has(id)) {
    const res = await fetch(`content/${id}.json`);
    if (!res.ok) throw new Error(`${id}: HTTP ${res.status}`);
    cache.set(id, await res.json());
  }
  return cache.get(id);
}

async function show(id) {
  current = id;
  document.querySelectorAll('button.scenario').forEach((b) =>
    b.setAttribute('aria-current', String(b.dataset.id === id))
  );

  const scenario = await load(id);
  // The entire scene is derived here, by the Dart engine, in the browser.
  const scene = JSON.parse(engineBuildScene(JSON.stringify(scenario)));
  if (scene.error) {
    document.getElementById('meta').innerHTML = `<div class="warn">engine error: ${scene.error}</div>`;
    return;
  }
  draw(scene);
  renderMeta(scenario, scene);
}

(async function init() {
  document.getElementById('engineInfo').textContent =
    `engine_dart ${engineVersion} compiled to JS`;

  const list = document.getElementById('list');
  for (const id of IDS) {
    const scenario = await load(id);
    const b = document.createElement('button');
    b.className = 'scenario';
    b.dataset.id = id;
    b.innerHTML = `${id}<small>${scenario.scene.type}</small>`;
    b.addEventListener('click', () => show(id));
    list.appendChild(b);
  }
  await show(IDS[0]);
})().catch((e) => {
  document.getElementById('meta').innerHTML = `<div class="warn">${e.message}</div>`;
});
</script>
</body>
</html>
